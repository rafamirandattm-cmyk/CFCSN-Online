<!DOCTYPE html>
<html>
<head>
  <title>CFCSN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 10px;
    }

    h1 {
      text-align: center;
      color: #38bdf8;
    }

    h2 {
      margin-top: 30px;
      border-bottom: 2px solid #334155;
      padding-bottom: 5px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 10px;
      text-align: center;
    }

    th {
      background: #334155;
    }

    tr:nth-child(even) {
      background: #1e293b;
    }

    .gold {
      color: gold;
      font-weight: bold;
    }

    .win { color: #22c55e; }
    .loss { color: #ef4444; }
    .draw { color: #eab308; }

    .rodada {
      background: #1e293b;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<h1>♟️ CFCSN - Torneios</h1>

<div id="torneio" class="card">Carregando...</div>

<h2>🏆 Ranking</h2>
<div class="card">
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Jogador</th>
        <th>Pontos</th>
      </tr>
    </thead>
    <tbody id="ranking"></tbody>
  </table>
</div>

<h2>📋 Rodadas</h2>
<div id="rodadas"></div>

<script>

// ================= TORNEIO =================
fetch("https://lichess.org/api/swiss/qMebYahN", {
  headers: { "Accept": "application/json" }
})
.then(r => r.json())
.then(d => {
  document.getElementById("torneio").innerHTML = `
    <h2>${d.name}</h2>
    <p>Status: ${d.status}</p>
    <p>Jogadores: ${d.nbPlayers}</p>
    <p>Rodadas: ${d.nbRounds}</p>
  `;
});

// ================= RANKING =================
fetch("https://lichess.org/api/swiss/qMebYahN/results", {
  headers: { "Accept": "application/x-ndjson" }
})
.then(r => r.text())
.then(t => {
  const linhas = t.trim().split("\n");
  let html = "";

  linhas.forEach(l => {
    if (!l) return;
    const j = JSON.parse(l);

    let classe = j.rank == 1 ? "gold" : "";

    html += `
      <tr class="${classe}">
        <td>${j.rank}</td>
        <td>${j.username}</td>
        <td>${j.points}</td>
      </tr>
    `;
  });

  document.getElementById("ranking").innerHTML = html;
});

// ================= RODADAS =================
fetch("https://lichess.org/api/swiss/qMebYahN/games", {
  headers: { "Accept": "application/x-ndjson" }
})
.then(r => r.text())
.then(t => {
  const linhas = t.trim().split("\n");
  let rodadas = {};

  linhas.forEach(l => {
    if (!l) return;

    const j = JSON.parse(l);

    const round = j.round;
    const white = j.players.white?.user?.name || "BYE";
    const black = j.players.black?.user?.name || "BYE";

    let resultado = "-";
    let classe = "";

    if (j.status === "draw") {
      resultado = "½ x ½";
      classe = "draw";
    } else if (j.winner === "white") {
      resultado = "1 x 0";
      classe = "win";
    } else if (j.winner === "black") {
      resultado = "0 x 1";
      classe = "loss";
    }

    if (!rodadas[round]) {
      rodadas[round] = [];
    }

    rodadas[round].push(`
      <p class="${classe}">
        ${white} ${resultado} ${black}
      </p>
    `);
  });

  let html = "";

  Object.keys(rodadas)
    .sort((a, b) => a - b)
    .forEach(r => {
      html += `
        <div class="rodada">
          <h3>Rodada ${r}</h3>
          ${rodadas[r].join("")}
        </div>
      `;
    });

  document.getElementById("rodadas").innerHTML = html;
});

</script>

</body>
</html>
