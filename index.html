<!DOCTYPE html>
<html>
<head>
  <title>CFCSN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { background:#0f172a; color:#e2e8f0; font-family:Arial; padding:10px;}
    h1 { text-align:center; color:#38bdf8;}
    .card { background:#1e293b; padding:15px; border-radius:12px; margin-bottom:15px;}
    table { width:100%; border-collapse:collapse;}
    th, td { padding:8px; text-align:center;}
    th { background:#334155;}
    button {
      width:100%;
      background:#1e293b;
      border:none;
      padding:10px;
      margin:5px 0;
      color:white;
      cursor:pointer;
      border-radius:8px;
    }
  </style>
</head>

<body>

<h1>♟️ CFCSN</h1>

<!-- TABULEIRO REAL -->
<div class="card">
  <iframe id="tabuleiro"
    src="https://lichess.org/embed/game/undefined"
    width="100%"
    height="400"
    frameborder="0">
  </iframe>
</div>

<div id="torneio" class="card">Carregando...</div>

<h2>🏆 Ranking</h2>
<div class="card">
<table>
<tr><th>#</th><th>Jogador</th><th>Pontos</th></tr>
<tbody id="ranking"></tbody>
</table>
</div>

<h2>📋 Jogos</h2>
<div id="jogos" class="card">Carregando...</div>

<script>

// TORNEIO (funciona direto)
fetch("https://lichess.org/api/swiss/qMebYahN")
.then(r=>r.json())
.then(d=>{
  document.getElementById("torneio").innerHTML =
    `<h2>${d.name}</h2>
     <p>Jogadores: ${d.nbPlayers}</p>`;
});

// RANKING (NDJSON funciona direto)
fetch("https://lichess.org/api/swiss/qMebYahN/results", {
  headers: { "Accept": "application/x-ndjson" }
})
.then(r=>r.text())
.then(t=>{
  let html="";
  t.split("\n").forEach(l=>{
    if(!l) return;
    let j=JSON.parse(l);
    html+=`<tr><td>${j.rank}</td><td>${j.username}</td><td>${j.points}</td></tr>`;
  });
  document.getElementById("ranking").innerHTML=html;
});

// JOGOS (SEM PROXY, só lista básica)
fetch("https://lichess.org/api/swiss/qMebYahN/games", {
  headers: { "Accept": "application/x-ndjson" }
})
.then(r=>r.text())
.then(t=>{
  let html="";
  t.split("\n").forEach(l=>{
    if(!l) return;
    let g=JSON.parse(l);

    let w=g.players.white?.user?.name||"BYE";
    let b=g.players.black?.user?.name||"BYE";

    html+=`
      <button onclick="abrirPartida('${g.id}')">
        ${w} vs ${b}
      </button>
    `;
  });

  document.getElementById("jogos").innerHTML=html;
});

// TROCAR TABULEIRO
function abrirPartida(id){
  document.getElementById("tabuleiro").src =
    "https://lichess.org/embed/game/" + id;
}

</script>

</body>
</html>
