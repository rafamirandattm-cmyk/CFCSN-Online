<!DOCTYPE html>
<html>
<head>
  <title>CFCSN</title>
</head>
<body>

<h1>CFCSN - Torneios</h1>

<div id="torneio">Carregando...</div>

<h2>Ranking</h2>
<table border="1">
  <tr>
    <th>#</th>
    <th>Jogador</th>
    <th>Pontos</th>
  </tr>
  <tbody id="ranking"></tbody>
</table>

<h2>Rodadas</h2>
<div id="rodadas">Carregando rodadas...</div>

<script>

// ================= TORNEIO =================
fetch("https://lichess.org/api/swiss/qMebYahN", {
  headers: {
    "Accept": "application/json"
  }
})
.then(r => r.json())
.then(d => {
  document.getElementById("torneio").innerHTML = `
    <h2>${d.name}</h2>
    <p>Status: ${d.status}</p>
    <p>Jogadores: ${d.nbPlayers}</p>
    <p>Rodadas: ${d.nbRounds}</p>
  `;
})
.catch(() => {
  document.getElementById("torneio").innerText = "Erro ao carregar";
});

// ================= RANKING =================
fetch("https://lichess.org/api/swiss/qMebYahN/results", {
  headers: {
    "Accept": "application/x-ndjson"
  }
})
.then(r => r.text())
.then(t => {
  const linhas = t.trim().split("\n");
  let html = "";

  linhas.forEach(l => {
    if (!l) return;

    const j = JSON.parse(l);

    html += `
      <tr>
        <td>${j.rank}</td>
        <td>${j.username}</td>
        <td>${j.points}</td>
      </tr>
    `;
  });

  document.getElementById("ranking").innerHTML = html;
})
.catch(() => {
  document.getElementById("ranking").innerHTML = "<tr><td colspan='3'>Erro</td></tr>";
});

// ================= RODADAS =================
fetch("https://lichess.org/api/swiss/qMebYahN/games", {
  headers: {
    "Accept": "application/x-ndjson"
  }
})
.then(r => r.text())
.then(t => {
  const linhas = t.trim().split("\n");
  let html = "";

  linhas.forEach(l => {
    if (!l) return;

    const j = JSON.parse(l);

    const white = j.players.white?.user?.name || "BYE";
    const black = j.players.black?.user?.name || "BYE";

    html += `<p>${white} vs ${black}</p>`;
  });

  document.getElementById("rodadas").innerHTML = html;
})
.catch(() => {
  document.getElementById("rodadas").innerText = "Erro ao carregar";
});

</script>

</body>
</html>
