<!DOCTYPE html>
<html>
<head>
  <title>CFCSN - Estilo Lichess</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background:#0f172a;
      color:#e2e8f0;
      font-family:Arial;
      margin:0;
      padding:10px;
    }

    h1 { text-align:center; color:#38bdf8; margin-bottom:20px; }

    .card {
      background:#1e293b;
      padding:15px;
      border-radius:12px;
      margin-bottom:15px;
    }

    table {
      width:100%;
      border-collapse:collapse;
    }

    th, td {
      padding:6px;
      text-align:center;
      font-size:14px;
    }

    th { background:#334155; }

    .streak span {
      display:inline-block;
      width:16px;
      height:16px;
      line-height:16px;
      text-align:center;
      margin:0 1px;
      border-radius:50%;
      font-size:12px;
      font-weight:bold;
      color:white;
    }

    .streak .win { background:#22c55e; }
    .streak .draw { background:#9ca3af; }
    .streak .loss { background:#ef4444; }

    button {
      width:100%;
      background:#334155;
      border:none;
      padding:10px;
      margin:5px 0;
      color:white;
      cursor:pointer;
      border-radius:8px;
      transition:0.2s;
    }

    button:hover { background:#475569; }

    .flex {
      display:flex;
      gap:15px;
      align-items:flex-start;
    }

    .col-esquerda { flex:1; min-width:250px; max-width:400px; }
    .col-direita { flex:5; position:sticky; top:10px; }

    iframe { width:100%; height:calc(100vh - 150px); border:none; border-radius:10px; }

    .rodada { margin-bottom:15px; }
    .rodada h3 { margin-bottom:8px; color:#facc15; }

    @media(max-width:1000px){
      .flex { flex-direction:column; }
      .col-esquerda { max-width:none; }
      .col-direita { position:static; flex:1; }
      iframe { height:400px; }
    }
  </style>
</head>
<body>

<h1>♟️ CFCSN</h1>

<div id="torneio" class="card">Carregando...</div>

<h2>🏆 Ranking</h2>
<div class="card">
<table>
<tr>
  <th>#</th>
  <th>Jogador</th>
  <th>Pontos</th>
  <th>Perf.</th>
  <th>Seq.</th>
</tr>
<tbody id="ranking"></tbody>
</table>
</div>

<div class="flex">
  <div class="col-esquerda">
    <h2>📋 Jogos</h2>
    <div id="jogos" class="card">Carregando...</div>
  </div>

  <div class="col-direita">
    <h2>♟️ Tabuleiro</h2>
    <div class="card">
      <iframe id="tabuleiro" src=""></iframe>
    </div>
  </div>
</div>

<script>
let nbPlayers = 0;

// Torneio
fetch("https://lichess.org/api/swiss/qMebYahN")
.then(r=>r.json())
.then(d=>{
  nbPlayers = d.nbPlayers || 10;
  document.getElementById("torneio").innerHTML =
    `<h2>${d.name}</h2><p>Jogadores: ${d.nbPlayers}</p>`;
});

// Ranking estilo Lichess
fetch("https://lichess.org/api/swiss/qMebYahN/results", { headers:{"Accept":"application/x-ndjson"} })
.then(r=>r.text())
.then(t=>{
  let html="";
  t.split("\n").forEach(l=>{
    if(!l) return;
    let j = JSON.parse(l);
    // sequência estilo Lichess
    let streakHtml="-";
    if(j.streak && Array.isArray(j.streak)){
      streakHtml = j.streak.map(s=>{
        if(s===1) return '<span class="win">1</span>';
        if(s===0) return '<span class="loss">0</span>';
        if(s===0.5) return '<span class="draw">½</span>';
        return s;
      }).join('');
      streakHtml = `<div class="streak">${streakHtml}</div>`;
    }
    html += `<tr>
      <td>${j.rank}</td>
      <td>${j.username}</td>
      <td>${j.points}</td>
      <td>${j.performance || '-'}</td>
      <td>${streakHtml}</td>
    </tr>`;
  });
  document.getElementById("ranking").innerHTML = html;
});

// Jogos agrupados automaticamente por rodada
fetch("https://lichess.org/api/swiss/qMebYahN/games", { headers:{ "Accept":"application/x-ndjson" } })
.then(r=>r.text())
.then(t=>{
  let jogosArr = [];
  t.split("\n").forEach(l=>{ if(!l) return; jogosArr.push(JSON.parse(l)); });

  let jogosPorRodada = Math.ceil(nbPlayers/2);
  let rodadaNum = 1;
  let html="";
  for(let i=0;i<jogosArr.length;i+=jogosPorRodada){
    let rodadaJogos = jogosArr.slice(i,i+jogosPorRodada);
    html+=`<div class="rodada"><h3>Rodada ${rodadaNum}</h3>`;
    rodadaJogos.forEach(g=>{
      let w=g.players.white?.user?.name||"BYE";
      let b=g.players.black?.user?.name||"BYE";
      html+=`<button onclick="abrirPartida('${g.id}')">${w} vs ${b}</button>`;
    });
    html+="</div>";
    rodadaNum++;
  }
  document.getElementById("jogos").innerHTML = html;
});

function abrirPartida(id){
  document.getElementById("tabuleiro").src = "https://lichess.org/embed/game/"+id;
}
</script>

</body>
</html>
