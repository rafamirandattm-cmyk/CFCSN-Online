<!DOCTYPE html>
<html>
<head>
  <title>CFCSN - Full Screen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background:#0f172a;
      color:#e2e8f0;
      font-family:Arial;
      margin:0;
      padding:10px;
    }

    h1 { text-align:center; color:#38bdf8; margin-bottom:20px; }

    .card {
      background:#1e293b;
      padding:15px;
      border-radius:12px;
      margin-bottom:15px;
    }

    table {
      width:100%;
      border-collapse:collapse;
    }

    th, td {
      padding:8px;
      text-align:center;
    }

    th { background:#334155; }

    button {
      width:100%;
      background:#334155;
      border:none;
      padding:10px;
      margin:5px 0;
      color:white;
      cursor:pointer;
      border-radius:8px;
      transition:0.2s;
    }

    button:hover {
      background:#475569;
    }

    .flex {
      display:flex;
      gap:15px;
      align-items:flex-start;
    }

    .col-esquerda {
      flex:1;
      min-width:250px; /* garante espaço mínimo para a lista */
      max-width:400px;
    }

    .col-direita {
      flex:5; /* ocupa quase todo o espaço restante */
      position:sticky;
      top:10px;
    }

    iframe {
      width:100%;
      height:calc(100vh - 150px);
      border:none;
      border-radius:10px;
    }

    .rodada {
      margin-bottom:15px;
    }

    .rodada h3 {
      margin-bottom:8px;
      color:#facc15;
    }

    @media(max-width:1000px){
      .flex { flex-direction:column; }
      .col-esquerda { max-width:none; }
      .col-direita { position:static; flex:1; }
      iframe { height:400px; }
    }

  </style>
</head>
<body>

<h1>♟️ CFCSN</h1>

<div id="torneio" class="card">Carregando...</div>

<h2>🏆 Ranking</h2>
<div class="card">
<table>
<tr>
  <th>#</th>
  <th>Jogador</th>
  <th>Pontos</th>
  <th>Performance</th>
  <th>Sequência</th>
  <th>Tie-Break</th>
</tr>
<tbody id="ranking"></tbody>
</table>
</div>

<div class="flex">

  <div class="col-esquerda">
    <h2>📋 Jogos</h2>
    <div id="jogos" class="card">Carregando...</div>
  </div>

  <div class="col-direita">
    <h2>♟️ Tabuleiro</h2>
    <div class="card">
      <iframe id="tabuleiro" src=""></iframe>
    </div>
  </div>

</div>

<script>

// Torneio
fetch("https://lichess.org/api/swiss/qMebYahN")
.then(r=>r.json())
.then(d=>{
  document.getElementById("torneio").innerHTML =
    `<h2>${d.name}</h2>
     <p>Jogadores: ${d.nbPlayers}</p>`;
});

// Ranking com streak colorido
fetch("https://lichess.org/api/swiss/qMebYahN/results", {
  headers: { "Accept": "application/x-ndjson" }
})
.then(r=>r.text())
.then(t=>{
  let html="";
  t.split("\n").forEach(l=>{
    if(!l) return;
    let j=JSON.parse(l);

    let streakHtml="-";
    if(j.streak && Array.isArray(j.streak)){
      streakHtml = j.streak.map(s=>{
        if(s===1) return '<span style="color:#22c55e;font-weight:bold;">1</span>';
        if(s===0) return '<span style="color:#ef4444;font-weight:bold;">0</span>';
        if(s===0.5) return '<span style="color:#9ca3af;font-weight:bold;">½</span>';
        return s;
      }).join('');
    }

    html+=`<tr>
      <td>${j.rank}</td>
      <td>${j.username}</td>
      <td>${j.points}</td>
      <td>${j.performance || '-'}</td>
      <td>${streakHtml}</td>
      <td>${j.tieBreak || '-'}</td>
    </tr>`;
  });
  document.getElementById("ranking").innerHTML=html;
});

// Jogos agrupados por rodada
fetch("https://lichess.org/api/swiss/qMebYahN/games", {
  headers:{ "Accept":"application/x-ndjson" }
})
.then(r=>r.text())
.then(t=>{
  let jogos = {};
  t.split("\n").forEach(l=>{
    if(!l) return;
    let g=JSON.parse(l);
    let rodada = g.round || "Rodada ?";
    if(!jogos[rodada]) jogos[rodada]=[];
    jogos[rodada].push(g);
  });

  let html="";
  Object.keys(jogos).sort((a,b)=>parseInt(a)-parseInt(b)).forEach(r=>{
    html+=`<div class="rodada"><h3>Rodada ${r}</h3>`;
    jogos[r].forEach(g=>{
      let w=g.players.white?.user?.name||"BYE";
      let b=g.players.black?.user?.name||"BYE";
      html+=`<button onclick="abrirPartida('${g.id}')">${w} vs ${b}</button>`;
    });
    html+="</div>";
  });

  document.getElementById("jogos").innerHTML=html;
});

// Atualizar tabuleiro
function abrirPartida(id){
  document.getElementById("tabuleiro").src =
    "https://lichess.org/embed/game/" + id;
}

</script>

</body>
</html>
