<!DOCTYPE html>
<html>
<head>
  <title>CFCSN</title>
</head>
<body>

<h1>CFCSN - Torneios</h1>

<div id="torneio">Carregando...</div>

<script>
fetch("https://lichess.org/api/swiss/qMebYahN")
  .then(res => res.text())
  .then(text => {
    const data = JSON.parse(text);

    document.getElementById("torneio").innerHTML = `
      <h2>${data.name}</h2>
      <p>Status: ${data.status}</p>
      <p>Jogadores: ${data.nbPlayers}</p>
      <p>Rodadas: ${data.nbRounds}</p>
    `;
  });
</script>

</body>
</html>
