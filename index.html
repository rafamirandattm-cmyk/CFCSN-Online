<!DOCTYPE html>
<html>
<head>
  <title>CFCSN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <!-- Chessboard -->
  <link rel="stylesheet" href="https://unpkg.com/chessboardjs@1.0.0/dist/chessboard.min.css">
  <script src="https://unpkg.com/chessboardjs@1.0.0/dist/chessboard.min.js"></script>

  <style>
    body { background:#0f172a; color:#e2e8f0; font-family:Arial; padding:10px;}
    h1 { text-align:center; color:#38bdf8;}
    .card { background:#1e293b; padding:15px; border-radius:12px; margin-bottom:15px;}
    table { width:100%; border-collapse:collapse;}
    th, td { padding:8px; text-align:center;}
    th { background:#334155;}
  </style>
</head>

<body>

<h1>♟️ CFCSN</h1>

<div class="card">
  <div id="board" style="max-width:400px;margin:auto;"></div>
</div>

<div id="torneio" class="card">Carregando...</div>

<h2>🏆 Ranking</h2>
<div class="card">
<table>
<tr><th>#</th><th>Jogador</th><th>Pontos</th></tr>
<tbody id="ranking"></tbody>
</table>
</div>

<script>

const proxy = "https://api.allorigins.win/raw?url=";

// tabuleiro
var board = Chessboard('board', { position: 'start' });

// TORNEIO
fetch(proxy + "https://lichess.org/api/swiss/qMebYahN")
.then(r=>r.json())
.then(d=>{
  document.getElementById("torneio").innerHTML =
    `<h2>${d.name}</h2>
     <p>Jogadores: ${d.nbPlayers}</p>`;
});

// RANKING (FUNCIONA)
fetch(proxy + "https://lichess.org/api/swiss/qMebYahN/results")
.then(r=>r.text())
.then(t=>{

  let html="";

  t.split("\n").forEach(l=>{
    if(!l) return;
    let j=JSON.parse(l);

    html+=`
      <tr>
        <td>${j.rank}</td>
        <td>${j.username}</td>
        <td>${j.points}</td>
      </tr>
    `;
  });

  document.getElementById("ranking").innerHTML=html;

});

</script>

</body>
</html>
