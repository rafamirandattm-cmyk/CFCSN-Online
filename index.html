<!DOCTYPE html>
<html>
<head>
  <title>CFCSN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: Arial;
      padding: 10px;
    }

    h1 { text-align: center; color: #38bdf8; }

    .card {
      background:#1e293b;
      padding:15px;
      border-radius:10px;
      margin-bottom:15px;
    }

    table {
      width:100%;
      border-collapse: collapse;
    }

    th, td {
      padding:10px;
      text-align:center;
    }

    th { background:#334155; }

    .gold { color:gold; font-weight:bold; }

    .rodada {
      background:#1e293b;
      padding:10px;
      border-radius:10px;
      margin-bottom:10px;
    }

    button {
      width:100%;
      background:none;
      border:none;
      text-align:left;
      padding:10px;
      font-size:16px;
      cursor:pointer;
    }

    .win { color:#22c55e; }
    .loss { color:#ef4444; }
    .draw { color:#eab308; }
  </style>
</head>

<body>

<h1>♟️ CFCSN - Torneios</h1>

<div id="torneio" class="card">Carregando...</div>

<h2>🏆 Ranking</h2>
<div class="card">
<table>
<thead>
<tr><th>#</th><th>Jogador</th><th>Pontos</th></tr>
</thead>
<tbody id="ranking"></tbody>
</table>
</div>

<h2>📋 Rodadas</h2>
<div id="rodadas">Carregando...</div>

<script>

const proxy = "https://api.allorigins.win/raw?url=";

// TORNEIO
fetch(proxy + "https://lichess.org/api/swiss/qMebYahN")
.then(r => r.json())
.then(d => {
  document.getElementById("torneio").innerHTML = `
    <h2>${d.name}</h2>
    <p>Status: ${d.status}</p>
    <p>Jogadores: ${d.nbPlayers}</p>
    <p>Rodadas: ${d.nbRounds}</p>
  `;
});

// RANKING
fetch(proxy + "https://lichess.org/api/swiss/qMebYahN/results")
.then(r => r.text())
.then(t => {
  let html="";
  t.split("\n").forEach(l=>{
    if(!l) return;
    let j=JSON.parse(l);

    html+=`
      <tr class="${j.rank==1?"gold":""}">
        <td>${j.rank}</td>
        <td>${j.username}</td>
        <td>${j.points}</td>
      </tr>
    `;
  });
  document.getElementById("ranking").innerHTML=html;
});

// RODADAS
fetch(proxy + "https://lichess.org/api/swiss/qMebYahN/games")
.then(r => r.text())
.then(t => {

  const linhas = t.split("\n").filter(l=>l);

  let html="";
  let rodada=1;
  let jogosPorRodada=2;

  for(let i=0;i<linhas.length;i+=jogosPorRodada){

    html+=`<div class="rodada"><h3>Rodada ${rodada}</h3>`;

    for(let j=0;j<jogosPorRodada;j++){
      if(!linhas[i+j]) continue;

      let g=JSON.parse(linhas[i+j]);

      let w=g.players.white?.user?.name||"BYE";
      let b=g.players.black?.user?.name||"BYE";

      let r="-",c="";
      if(g.status==="draw"){r="½ x ½";c="draw";}
      else if(g.winner==="white"){r="1 x 0";c="win";}
      else if(g.winner==="black"){r="0 x 1";c="loss";}

      let link = "https://lichess.org/" + g.id;

      html+=`
        <button class="${c}" onclick="abrirJogo('${link}')">
          ${w} ${r} ${b}
        </button>
      `;
    }

    html+=`</div>`;
    rodada++;
  }

  document.getElementById("rodadas").innerHTML=html;

});

// ABRIR JOGO
function abrirJogo(link){
  window.open(link, "_blank");
}

</script>

</body>
</html>
