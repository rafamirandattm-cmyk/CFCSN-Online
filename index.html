<!DOCTYPE html>
<html>
<head>
  <title>CFCSN Torneios Online</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background:#0f172a;
      color:#e2e8f0;
      font-family:Arial;
      margin:0;
      padding:10px;
    }

    h1 { text-align:center; color:#38bdf8; margin-bottom:20px; }

    .card {
      background:#1e293b;
      padding:15px;
      border-radius:12px;
      margin-bottom:15px;
    }

    table {
      width:100%;
      border-collapse:collapse;
    }

    th, td {
      padding:6px;
      text-align:center;
      font-size:14px;
    }

    th { background:#334155; }

    button {
      width:100%;
      background:#334155;
      border:none;
      padding:10px;
      margin:5px 0;
      color:white;
      cursor:pointer;
      border-radius:8px;
      transition:0.2s;
    }

    button:hover { background:#475569; }

    .flex {
      display:flex;
      gap:15px;
      align-items:flex-start;
    }

    .col-esquerda { flex:1; min-width:250px; max-width:400px; }
    .col-direita { flex:5; position:sticky; top:10px; }

    iframe { width:100%; height:calc(100vh - 150px); border:none; border-radius:10px; }

    .rodada { margin-bottom:15px; }
    .rodada h3 { margin-bottom:8px; color:#facc15; }

    .podium {
      display:flex;
      justify-content:center;
      gap:20px;
      margin-bottom:20px;
      align-items:flex-end;
    }
    .podium .medal {
      background:#334155;
      padding:10px;
      border-radius:12px;
      width:100px;
      text-align:center;
      color:white;
    }
    .podium .gold { background:#FFD700; color:#000; font-weight:bold; font-size:18px; height:140px; }
    .podium .silver { background:#C0C0C0; color:#000; height:120px; }
    .podium .bronze { background:#CD7F32; color:#000; height:100px; }

    @media(max-width:1000px){
      .flex { flex-direction:column; }
      .col-esquerda { max-width:none; }
      .col-direita { position:static; flex:1; }
      iframe { height:400px; }
      .podium { flex-direction:column; align-items:center; }
      .podium .medal { width:120px; margin-bottom:10px;}
    }

    /* Placeholder quando nenhum jogo é selecionado */
    #tabuleiro-placeholder {
      display:flex;
      justify-content:center;
      align-items:center;
      height:calc(100vh - 150px);
      background:#1e293b;
      color:#9ca3af;
      font-size:18px;
      border-radius:10px;
    }
  </style>
</head>
<body>

<h1>CFCSN Torneios Online</h1>

<div id="torneio" class="card">Carregando...</div>

<!-- Podium -->
<div id="podium" class="card podium">Carregando podium...</div>

<h2>🏆 Ranking Detalhado</h2>
<div class="card">
<table>
<tr>
  <th>#</th>
  <th>Jogador</th>
  <th>Pontos</th>
  <th>Perf.</th>
  <th>Sequência</th>
</tr>
<tbody id="ranking"></tbody>
</table>
</div>

<div class="flex">
  <div class="col-esquerda">
    <h2>📋 Jogos</h2>
    <div id="jogos" class="card">Carregando...</div>
  </div>

  <div class="col-direita">
    <h2>♟️ Tabuleiro</h2>
    <div class="card">
      <div id="tabuleiro-placeholder">Clique em um jogo para ver aqui</div>
      <iframe id="tabuleiro" style="display:none;"></iframe>
    </div>
  </div>
</div>

<script>
const jogosPorRodada = 2; // ajuste conforme necessário
let nbPlayers = 0;

// TORNEIO
fetch("https://lichess.org/api/swiss/qMebYahN")
.then(r=>r.json())
.then(d=>{
  nbPlayers = d.nbPlayers || 10;
  document.getElementById("torneio").innerHTML =
    `<h2>${d.name}</h2><p>Jogadores: ${d.nbPlayers}</p>`;
});

// RANKING COM SEQUÊNCIA 1 0 ½
fetch("https://lichess.org/api/swiss/qMebYahN/results", { headers:{"Accept":"application/x-ndjson"} })
.then(r=>r.text())
.then(t=>{
  let jogadores=[];
  t.split("\n").forEach(l=>{
    if(!l) return;
    let j = JSON.parse(l);
    let seq="-";
    if(j.streak && Array.isArray(j.streak)){
      seq = j.streak.map(s => s===1?'1': s===0?'0':'½').join(' ');
    }
    jogadores.push({
      rank: j.rank,
      username: j.username,
      points: j.points,
      performance: j.performance || '-',
      seq: seq
    });
  });

  // Podium
  let podiumHtml="";
  const medalas = ['gold','silver','bronze'];
  for(let i=0;i<3 && i<jogadores.length;i++){
    podiumHtml += `<div class="medal ${medalas[i]}">${jogadores[i].username}</div>`;
  }
  document.getElementById("podium").innerHTML = podiumHtml;

  // Ranking
  let html="";
  jogadores.forEach(j=>{
    html += `<tr>
      <td>${j.rank}</td>
      <td>${j.username}</td>
      <td>${j.points}</td>
      <td>${j.performance}</td>
      <td>${j.seq}</td>
    </tr>`;
  });
  document.getElementById("ranking").innerHTML = html;
});

// JOGOS AGRUPADOS POR RODADA
fetch("https://lichess.org/api/swiss/qMebYahN/games", { headers:{ "Accept":"application/x-ndjson" } })
.then(r=>r.text())
.then(t=>{
  let jogosArr = [];
  t.split("\n").forEach(l=>{ if(!l) return; jogosArr.push(JSON.parse(l)); });

  let rodadaNum = 1;
  let html="";
  for(let i=0;i<jogosArr.length;i+=jogosPorRodada){
    let rodadaJogos = jogosArr.slice(i,i+jogosPorRodada);
    html+=`<div class="rodada"><h3>Rodada ${rodadaNum}</h3>`;
    rodadaJogos.forEach(g=>{
      let w=g.players.white?.user?.name||"BYE";
      let b=g.players.black?.user?.name||"BYE";
      html+=`<button onclick="abrirPartida('${g.id}')">${w} vs ${b}</button>`;
    });
    html+="</div>";
    rodadaNum++;
  }
  document.getElementById("jogos").innerHTML = html;
});

// FUNÇÃO PARA ABRIR PARTIDA
function abrirPartida(id){
  document.getElementById("tabuleiro-placeholder").style.display = "none";
  const frame = document.getElementById("tabuleiro");
  frame.style.display = "block";
  frame.src = "https://lichess.org/embed/game/"+id;
}
</script>

</body>
</html>
