<!DOCTYPE html>
<html>
<head>
  <title>CFCSN</title>
</head>
<body>

<h1>CFCSN - Torneios</h1>

<div id="torneio">Carregando...</div>

<h2>Ranking</h2>
<table border="1">
  <tr>
    <th>#</th>
    <th>Jogador</th>
    <th>Pontos</th>
  </tr>
  <tbody id="ranking"></tbody>
</table>

<h2>Rodadas</h2>
<div id="rodadas">Carregando rodadas...</div>

<script>

// TORNEIO
fetch("https://lichess.org/api/swiss/qMebYahN")
  .then(r => r.text())
  .then(t => {
    const d = JSON.parse(t);
    document.getElementById("torneio").innerHTML = `
      <h2>${d.name}</h2>
      <p>Status: ${d.status}</p>
      <p>Jogadores: ${d.nbPlayers}</p>
      <p>Rodadas: ${d.nbRounds}</p>
    `;
  });

// RANKING
fetch("https://lichess.org/api/swiss/qMebYahN/results")
  .then(r => r.text())
  .then(t => {
    const linhas = t.trim().split("\n");
    let html = "";

    linhas.forEach(l => {
      const j = JSON.parse(l);
      html += `
        <tr>
          <td>${j.rank}</td>
          <td>${j.username}</td>
          <td>${j.points}</td>
        </tr>
      `;
    });

    document.getElementById("ranking").innerHTML = html;
  });

// RODADAS (AGRUPADAS)
fetch("https://lichess.org/api/swiss/qMebYahN/games", {
  headers: {
    "Accept": "application/x-ndjson"
  }
})  .then(r => r.text())
  .then(t => {
    const linhas = t.trim().split("\n");
    const grupos = {};

    linhas.forEach(l => {
      const j = JSON.parse(l);
      if (!grupos[j.round]) grupos[j.round] = [];
      grupos[j.round].push(j);
    });

    let html = "";

    Object.keys(grupos).sort((a,b)=>a-b).forEach(r => {
      html += `<h3>Rodada ${r}</h3>`;
      grupos[r].forEach(j => {
        html += `
          <p>
${j.players.white?.user?.name || "BYE"} vs 
${j.players.black?.user?.name || "BYE"}
          </p>
        `;
      });
    });

    document.getElementById("rodadas").innerHTML = html;
  });

</script>

</body>
</html>
